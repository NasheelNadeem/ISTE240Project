<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Feedback</title>
</head>
<body>
    <h2>Add Feedback</h2>
    <form action="/addFeedback" method="post" class="ui form">
        <label>Patient:</label><br>
        <input type="text" name="patient" required><br><br>

        <label>Doctor:</label><br>
        <input type="text" name="doctor" required><br><br>

        <label>Rating:</label><br>
        <input type="number" name="rating" required><br><br>

        <label>Comment:</label><br>
        <input type="text" name="comment" required><br><br>

        <button type="submit">Submit Feedback</button>
    </form>
</body>
</html>
