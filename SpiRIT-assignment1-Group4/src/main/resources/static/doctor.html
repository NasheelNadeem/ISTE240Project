<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor List</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.5.0/semantic.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.5.0/semantic.min.js"></script>

    <style>
        body { background:#f4f7f9; padding:30px; }
        .page-card {
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 0 12px rgba(0,0,0,0.08);
            margin-bottom:25px;
        }
        #message { display:none; }
    </style>
</head>

<body>

<div class="ui main container">

    <div class="ui blue inverted menu">
        <a class="header item" href="index.html">SpiRIT Psychology</a>
        <a class="item active" href="doctor.html">Doctors</a>
        <a class="item" href="patients.html">Patients</a>
        <a class="item" href="appointments.html">Appointments</a>
    </div>

    <div class="page-card">
        <h2 class="ui header">Doctor Management</h2>

        <div id="message" class="ui message"></div>

        <div class="ui action input fluid">
            <input type="text" id="searchName" placeholder="Search by name">
            <button class="ui blue button" onclick="searchDoctor()">Search</button>
            <button class="ui button" onclick="loadDoctors()">Show All</button>
        </div>
    </div>

    <div class="page-card">
        <h3 id="formTitle">Add Doctor</h3>

        <input type="hidden" id="doctorId">

        <div class="ui form">
            <div class="field">
                <label>Name</label>
                <input id="name">
            </div>

            <div class="field">
                <label>Profession</label>
                <input id="profession">
            </div>

            <button class="ui green button" onclick="saveDoctor()">Save</button>
            <button class="ui button" onclick="clearForm()">Clear</button>
        </div>
    </div>

    <div class="page-card">
        <table class="ui table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Profession</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="doctorTable"></tbody>
        </table>
    </div>

</div>

<script>

    const API = "/api/doctors";

    $(document).ready(loadDoctors);

    function loadDoctors(){
        $.get(API, displayDoctors);
    }

    function displayDoctors(data){
        let rows = "";

        if(!data || data.length === 0){
            $("#doctorTable").html("<tr><td colspan='4'>No doctors found</td></tr>");
            return;
        }

        data.forEach(d=>{
            rows += `
    <tr>
      <td>${d.id}</td>
      <td>${d.name}</td>
      <td>${d.profession}</td>
      <td>
        <button class="ui yellow button" onclick='editDoctor(${JSON.stringify(d)})'>Edit</button>
        <button class="ui red button" onclick="deleteDoctor(${d.id})">Delete</button>
      </td>
    </tr>`;
        });

        $("#doctorTable").html(rows);
    }

    function saveDoctor(){
        let id = $("#doctorId").val();

        let doctor = {
            name: $("#name").val(),
            profession: $("#profession").val()
        };

        let method = id ? "PUT" : "POST";
        let url = id ? API + "/" + id : API;

        $.ajax({
            url:url,
            type:method,
            contentType:"application/json",
            data:JSON.stringify(doctor),
            success:function(){
                showMessage("Saved successfully","positive");
                clearForm();
                loadDoctors();
            }
        });
    }

    function editDoctor(d){
        $("#formTitle").text("Edit Doctor");
        $("#doctorId").val(d.id);
        $("#name").val(d.name);
        $("#profession").val(d.profession);
    }

    function deleteDoctor(id){
        if(!confirm("Are you sure you want to delete this doctor?")) return;

        $.ajax({
            url:API+"/"+id,
            type:"DELETE",
            success:function(){
                showMessage("Deleted successfully","positive");
                loadDoctors();
            }
        });
    }

    function searchDoctor(){
        let name=$("#searchName").val();

        if(name===""){ loadDoctors(); return; }

        $.get(API+"/search?name="+name, displayDoctors);
    }

    function clearForm(){
        $("#formTitle").text("Add Doctor");
        $("#doctorId").val("");
        $("#name").val("");
        $("#profession").val("");
    }

    function showMessage(text,type){
        $("#message").removeClass("positive negative").addClass(type).html(text).fadeIn();
        setTimeout(()=>$("#message").fadeOut(),3000);
    }

</script>

</body>
</html>
