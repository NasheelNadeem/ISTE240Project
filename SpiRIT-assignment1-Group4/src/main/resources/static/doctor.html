<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Doctor Management</h2>

<!-- Add Doctor -->
<div class="mb-3">
    <input id="name" class="form-control mb-2" placeholder="Doctor Name">
    <input id="profession" class="form-control mb-2" placeholder="Profession">
    <button class="btn btn-primary" onclick="addDoctor()">Add Doctor</button>
</div>

<!-- Search -->
<input id="search" class="form-control mb-3" placeholder="Search by name" onkeyup="searchDoctor()">

<!-- Table -->
<table class="table table-bordered">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Profession</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id="doctorTable"></tbody>
</table>

<script>
    let API = "api/doctors";

    function loadDoctors() {
        fetch(API)
            .then(res => res.json())
            .then(data => {
                let table = "";
                data.forEach(d => {
                    table += `
                <tr>
                    <td>${d.id}</td>
                    <td>${d.name}</td>
                    <td>${d.profession}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="editDoctor(${d.id})">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteDoctor(${d.id})">Delete</button>
                    </td>
                </tr>`;
                });
                document.getElementById("doctorTable").innerHTML = table;
            });
    }

    function addDoctor() {
        const name = document.getElementById("name").value;
        const profession = document.getElementById("profession").value;

        fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, profession })
        }).then(() => loadDoctors());
    }

    function deleteDoctor(id) {
        fetch(API + "/" + id, { method: "DELETE" })
            .then(() => loadDoctors());
    }

    function editDoctor(id) {
        const name = prompt("Enter new name:");
        const profession = prompt("Enter new profession:");

        fetch(API + "/" + id, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, profession })
        }).then(() => loadDoctors());
    }

    function searchDoctor() {
        const name = document.getElementById("search").value;

        if (name === "") {
            loadDoctors();
            return;
        }

        fetch(API + "/search?name=" + name)
            .then(res => res.json())
            .then(data => {
                let table = "";
                data.forEach(d => {
                    table += `<tr>
                    <td>${d.id}</td>
                    <td>${d.name}</td>
                    <td>${d.profession}</td>
                    <td></td>
                </tr>`;
                });
                document.getElementById("doctorTable").innerHTML = table;
            });
    }

    loadDoctors();
</script>

</body>
</html>
